<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Link Expired or Already Used</title>
  <style>
    body { margin: 0; padding: 0; background-color: #f4f4f4; font-family: Arial, Helvetica, sans-serif; }
    .container { max-width: 480px; margin: 80px auto; background: #fff; border-radius: 8px; padding: 48px 40px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    .icon { font-size: 48px; margin-bottom: 16px; }
    h1 { font-size: 24px; color: #111827; margin: 0 0 16px 0; }
    p { font-size: 15px; color: #6b7280; line-height: 1.6; margin: 0 0 12px 0; }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">⚠️</div>
    <h1>Link Expired or Already Used</h1>
    <p>This sign-in link is no longer valid. It may have expired or already been used.</p>
    <p>Please request a new sign-in link and try again.</p>
  </div>
</body>
</html>
